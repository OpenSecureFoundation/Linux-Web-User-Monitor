<header class="h-16 flex items-center justify-between px-6 border-b border-border-dark bg-background-dark/80 backdrop-blur-md sticky top-0 z-20">
  <div class="flex items-center gap-6">
    <!-- Indicateur de Live Status -->
    <div class="flex items-center gap-2">
      <div class="w-2 h-2 rounded-full bg-primary shadow-[0_0_8px_#13ec5b] animate-pulse"></div>
      <h1 class="text-sm font-bold tracking-widest text-white uppercase">Live Status</h1>
    </div>

    <!-- Section Uptime -->
    <div class="flex h-8 items-center gap-2 rounded bg-card-dark border border-border-dark px-3">
      <span class="material-symbols-outlined text-primary text-[16px]">schedule</span>
      <p class="text-[10px] font-bold">UP: {{ stats.uptime() }}</p>
    </div>

    <!-- Section Load Average -->
    <div class="flex items-center gap-2">
      @for (load of stats.loadAvg(); track $index) {
        <div [class]="'flex h-8 items-center gap-2 rounded border px-3 transition-colors ' + getLoadColor(load)">
          <span class="material-symbols-outlined text-[16px]">bar_chart</span>
          <p class="text-[10px] font-bold uppercase">{{$index === 0 ? '1m' : $index === 1 ? '5m' : '15m'}}: {{ load.toFixed(2) }}</p>
        </div>
      }
    </div>
  </div>

  <!-- Alerte Zombies -->
  @if (stats.zombieCount() > 0) {
    <div class="flex items-center gap-4">
      <button class="flex items-center gap-2 bg-red-500/10 border border-red-500/20 px-3 py-1.5 rounded text-red-500 animate-bounce">
        <span class="material-symbols-outlined text-sm">skull</span>
        <span class="text-[10px] font-bold uppercase tracking-wider">{{ stats.zombieCount() }} Zombies</span>
      </button>
      <div class="h-8 w-px bg-border-dark"></div>
      <button class="p-2 text-slate-400 hover:text-white"><span class="material-symbols-outlined">notifications</span></button>
    </div>
  }
 </header>
